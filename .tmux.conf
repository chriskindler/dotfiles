set -g default-terminal 'tmux-256color'
set -ga terminal-overrides ",*:Tc"

# new prefix
set -g prefix C-b

# new binding to split panes
unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

# enable vim movements within tmux
unbind -T copy-mode-vi MouseDragEnd1Pane

# resize windows
bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5

# selection and yanking inside tmux with vim keybindings
set-window-option -g mode-keys vi

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# maximise pane
bind -r m resize-pane -Z

# enable mouse support
set -g mouse on

# set status bar background and foreground black and white
set -g status-bg '#000000'
set -g status-fg '#ffffff'

# tmux plugin manager tpm
set -g @plugin 'tmux-plugins/tpm'

# theme and other plugins
set -g @themepack 'basic'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# init tmux plugin manager (must be places at the end of the config)
run '~/.tmux/plugins/tpm/tpm'
